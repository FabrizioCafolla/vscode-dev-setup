services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      target: vscode
    volumes:
      # Mount project root directory
      - ..:/workspace:cached
      # Mount cache directories
      - ../.devcontainer/cache/claude:/root/.claude:cached
      - ../.devcontainer/cache/copilot:/root/.copilot:cached
      - ../.devcontainer/cache/opencode:/.local/share/opencode:cached
      - ../.devcontainer/cache/llama:/root/.llama:cached
      # Mount config files
      - ../.devcontainer/configs/.zshrc:/root/.zshrc:cached
      - ../.devcontainer/configs/.zsh_history:/root/.zsh_history:cached
      - ../.devcontainer/configs/.aws:/root/.aws:cached
    network_mode: host
    privileged: true
    command: sleep infinity
